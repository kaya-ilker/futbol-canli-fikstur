name: Futbol Guncelleme
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Paketleri Yukle
        run: pip install requests pandas openpyxl

      - name: Kodu Calistir
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python ana_kod.py

      - name: Kaydet
        run: |
          git config --global user.name 'Sistem'
          git config --global user.email 'bot@github.com'
          git pull --rebase
          git add maclarim.xlsx
          git commit -m "Excel guncellendi" || exit 0
          git push
